name: Deploy tools to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/sparcd-explorer/**"
      - "apps/sparcd-uploader/**"
      - "apps/sparcd-tagger/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Explorer (marimo WASM) -> site root ---
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Sync explorer Python deps
        working-directory: apps/sparcd-explorer
        run: uv sync

      - name: Generate WASM-flavored notebook (prepend PEP 723 deps)
        working-directory: apps/sparcd-explorer
        run: |
          set -euo pipefail
          {
            printf '# /// script\n# requires-python = ">=3.11"\n# dependencies = ["marimo","minio","python-dotenv","polars","plotly","h3"]\n# ///\n\n'
            cat notebooks/hello.py
          } > notebooks/hello_wasm.py

      - name: Export explorer static WASM bundle
        working-directory: apps/sparcd-explorer
        run: uv run marimo export html-wasm notebooks/hello_wasm.py -o dist --mode run --force

      # --- Uploader (Vite) -> /uploader ---
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build uploader
        run: pnpm --filter sparcd-uploader build

      - name: Build tagger
        run: pnpm --filter sparcd-tagger build

      # --- Assemble combined site ---
      - name: Assemble site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/uploader _site/tagger
          cp -r apps/sparcd-explorer/dist/. _site/
          cp -r apps/sparcd-uploader/dist/. _site/uploader/
          cp -r apps/sparcd-tagger/dist/. _site/tagger/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
